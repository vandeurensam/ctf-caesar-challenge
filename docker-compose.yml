services:
  ctfd:
    image: ctfd/ctfd:latest
    ports:
      - "8000:8000"
    environment:
      - WORKERS=1
    env_file: .env
    volumes:
      - ctfd_data:/var/lib/ctfd
    networks:
      - ctf_network
    depends_on:
      - caesar-challenge
      - image-challenge
      - http-challenge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  caesar-challenge:
    build:
      context: .
      dockerfile: Dockerfile.caesar
    container_name: caesar-challenge
    stdin_open: true
    tty: true
    env_file: .env
    networks:
      - ctf_network

  image-challenge:
    build:
      context: .
      dockerfile: Dockerfile.image_metadata
    container_name: image-challenge
    stdin_open: true
    tty: true
    env_file: .env
    networks:
      - ctf_network

  http-challenge:
    build:
      context: .
      dockerfile: Dockerfile.http_headers
    container_name: http-challenge
    ports:
      - "5000:5000"
    env_file: .env
    networks:
      - ctf_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ctfd_data:

networks:
  ctf_network:
    driver: bridge
