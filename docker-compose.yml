version: '3.8'

services:
  ctfd:
    image: ctfd/ctfd:latest
    container_name: ctfd
    ports:
      - "8000:8000"
    environment:
      - WORKERS=1
    volumes:
      - ctfd_data:/var/lib/ctfd
    networks:
      - ctf_network
    depends_on:
      - caesar-challenge
      - image-challenge
      - http-challenge

  caesar-challenge:
    build:
      context: .
      dockerfile: Dockerfile.caesar
    container_name: caesar-challenge
    stdin_open: true
    tty: true
    networks:
      - ctf_network

  image-challenge:
    build:
      context: .
      dockerfile: Dockerfile.image_metadata
    container_name: image-challenge
    stdin_open: true
    tty: true
    networks:
      - ctf_network

  http-challenge:
    build:
      context: .
      dockerfile: Dockerfile.http_headers
    container_name: http-challenge
    ports:
      - "5000:5000"
    networks:
      - ctf_network

volumes:
  ctfd_data:

networks:
  ctf_network:
    driver: bridge
